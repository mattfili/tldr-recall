<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Recall — Variants</title>
<link rel="stylesheet" href="recall.css" />
<style>
  html, body { margin: 0; height: 100%; background: #f0eee9; }
</style>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="data.js"></script>
</head>
<body>
<div id="root"></div>
<script type="text/babel" src="ui.jsx"></script>
<script type="text/babel" src="home-variants.jsx"></script>
<script type="text/babel" src="search-variants.jsx"></script>
<script type="text/babel" src="card-variants.jsx"></script>
<script type="text/babel" src="editorial-dark.jsx"></script>
<script type="text/babel" src="design-canvas.jsx"></script>
<script type="text/babel" data-presets="react">
function Variants() {
  return (
    <DesignCanvas>
      <DCSection id="home" title="Home / Library" subtitle="Where you land when you open Recall — three directions, same data.">
        <DCArtboard id="home-a" label="A · Search dashboard" width={1200} height={820}><HomeA /></DCArtboard>
        <DCArtboard id="home-b" label="B · Triage inbox" width={1200} height={820}><HomeB /></DCArtboard>
        <DCArtboard id="home-c" label="C · Dense library" width={1200} height={820}><HomeC /></DCArtboard>
      </DCSection>

      <DCSection id="search" title="Smart Search" subtitle="Natural-language recall — built around your two real queries, three ways to feel it.">
        <DCArtboard id="search-a" label="A · Parsed filter chips" width={1200} height={720}><SearchA /></DCArtboard>
        <DCArtboard id="search-b" label="B · Conversational answer" width={1200} height={720}><SearchB /></DCArtboard>
        <DCArtboard id="search-c" label="C · Query builder" width={1200} height={720}><SearchC /></DCArtboard>
      </DCSection>

      <DCSection id="card" title="Item Card" subtitle="How one saved item presents — three densities, mix & match with the screens above.">
        <DCArtboard id="card-a" label="A · Editorial" width={440} height={440}><CardA /></DCArtboard>
        <DCArtboard id="card-b" label="B · Dense row" width={760} height={440}><CardB /></DCArtboard>
        <DCArtboard id="card-c" label="C · Rich · why-it-matters" width={460} height={680}><CardC /></DCArtboard>
      </DCSection>

      <DCSection id="editorial" title="Editorial — read the issue" subtitle="Recall is one feature; you can also consume the newsletter inside the app. Save while you read.">
        <DCArtboard id="ed-a" label="A · Issue reader" width={1200} height={1000}><IssueReader /></DCArtboard>
        <DCArtboard id="ed-b" label="B · Article focus" width={760} height={1000}><ArticleFocus /></DCArtboard>
        <DCArtboard id="ed-c" label="C · Issue reader · dark" width={1200} height={1000}><Dark><IssueReader /></Dark></DCArtboard>
      </DCSection>

      <DCSection id="dark" title="Dark mode" subtitle="Same system, inverted — for night reading. Every screen above has a dark counterpart.">
        <DCArtboard id="dark-a" label="A · Search dashboard" width={1200} height={820}><Dark><HomeA /></Dark></DCArtboard>
        <DCArtboard id="dark-b" label="B · Dense library" width={1200} height={820}><Dark><HomeC /></Dark></DCArtboard>
        <DCArtboard id="dark-c" label="C · Smart search" width={1200} height={720}><Dark><SearchA /></Dark></DCArtboard>
        <DCArtboard id="dark-d" label="D · Rich card" width={460} height={680}><Dark><CardC /></Dark></DCArtboard>
      </DCSection>
    </DesignCanvas>
  );
}
ReactDOM.createRoot(document.getElementById('root')).render(<Variants />);
</script>
</body>
</html>
