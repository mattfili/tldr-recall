# Alembic configuration. The database URL is supplied at runtime from recall.config
# (see alembic/env.py); the sqlalchemy.url below is a placeholder only.
[alembic]
script_location = alembic
prepend_sys_path = .
path_separator = os

# Placeholder — overridden in env.py from settings.database_url.
sqlalchemy.url = postgresql+psycopg://recall:recall@localhost:5432/recall

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARNING
handlers = console
qualname =

[logger_sqlalchemy]
level = WARNING
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
