name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  backend:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: recall
          POSTGRES_PASSWORD: recall
          POSTGRES_DB: recall
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U recall -d recall"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      DATABASE_URL: postgresql+psycopg://recall:recall@localhost:5432/recall
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Enable pgvector extension
        # The /health db check only needs SELECT 1, but creating the extension
        # here keeps CI aligned with the migrations that land in #2.
        run: |
          PGPASSWORD=recall psql -h localhost -U recall -d recall \
            -c "CREATE EXTENSION IF NOT EXISTS vector;"

      - name: Sync dependencies
        working-directory: backend
        run: uv sync

      - name: Migrate + seed database
        # The #3 read-endpoint contract tests run against the migrated + seeded DB.
        # (The #2 migration test manages its own throwaway recall_test DB separately.)
        working-directory: backend
        run: |
          uv run alembic upgrade head
          uv run recall seed

      - name: Lint (ruff)
        working-directory: backend
        run: uv run ruff check .

      - name: Test (pytest)
        working-directory: backend
        run: uv run pytest -q

  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        working-directory: frontend
        run: npm install

      - name: Typecheck
        working-directory: frontend
        run: npm run typecheck

      - name: Lint (eslint)
        working-directory: frontend
        run: npm run lint

      - name: Build
        working-directory: frontend
        run: npm run build

      - name: Test (vitest)
        working-directory: frontend
        run: npm test
