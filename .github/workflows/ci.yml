name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  backend:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: recall
          POSTGRES_PASSWORD: recall
          POSTGRES_DB: recall
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U recall -d recall"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      DATABASE_URL: postgresql+psycopg://recall:recall@localhost:5432/recall
    steps:
      - uses: actions/checkout@v5

      - name: Install uv
        uses: astral-sh/setup-uv@v6

      - name: Enable pgvector extension
        # The /health db check only needs SELECT 1, but creating the extension
        # here keeps CI aligned with the migrations that land in #2.
        run: |
          PGPASSWORD=recall psql -h localhost -U recall -d recall \
            -c "CREATE EXTENSION IF NOT EXISTS vector;"

      - name: Sync dependencies
        working-directory: backend
        run: uv sync

      - name: Migrate + seed database
        # The #3 read-endpoint contract tests run against the migrated + seeded DB.
        # (The #2 migration test manages its own throwaway recall_test DB separately.)
        working-directory: backend
        run: |
          uv run alembic upgrade head
          uv run recall seed

      - name: Lint (ruff)
        working-directory: backend
        run: uv run ruff check .

      - name: Test (pytest)
        working-directory: backend
        run: uv run pytest -q

  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          # Matches frontend/Dockerfile (node:22). Node 20 actions are retired 2026-06-16.
          node-version: "22"

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Typecheck
        working-directory: frontend
        run: npm run typecheck

      - name: Lint (eslint)
        working-directory: frontend
        run: npm run lint

      - name: Build
        working-directory: frontend
        run: npm run build

      - name: Test (vitest)
        working-directory: frontend
        run: npm test

  mobile:
    runs-on: ubuntu-latest
    env:
      EXPO_NO_TELEMETRY: "1"
    steps:
      - uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: "22"

      # tsc realpaths the web-src symlink, so type resolution can reach
      # frontend/node_modules — install both trees for deterministic checks.
      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Install mobile dependencies
        working-directory: mobile
        run: npm ci

      - name: Typecheck
        working-directory: mobile
        run: npx tsc --noEmit

      - name: Export bundles (native + DOM)
        # Proves the whole cross-package graph compiles: the web-src symlink,
        # the env alias, dedupe, and the 'use dom' web bundle.
        working-directory: mobile
        run: npx expo export --platform ios
